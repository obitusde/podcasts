<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Radio Player</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
  color:#fff;
  height:100dvh;
  display:flex; flex-direction:column;
  padding: env(safe-area-inset-top,0) env(safe-area-inset-right,0)
           env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);
}

/* ── TOPBAR ── */
.topbar {
  flex-shrink:0;
  display:flex; align-items:center;
  padding:10px 10px;
  border-bottom:2px solid #222;
  gap:6px;
}
.logo-box {
  display:flex; align-items:center; gap:6px;
  border-radius:7px; padding:5px 9px 5px 7px;
  flex-shrink:0;
}
.logo-dot  { width:8px; height:8px; border-radius:50%; background:#fff; flex-shrink:0; }
.logo-text { font-size:16px; font-weight:900; color:#fff; letter-spacing:-0.5px; line-height:1; }
.version   { font-size:10px; font-weight:900; padding-left:3px; }

/* Station switcher */
.station-tabs {
  display:flex; gap:5px; flex:1; justify-content:center;
}
.tab {
  border:none; cursor:pointer; border-radius:18px;
  font-family:inherit; font-size:13px; font-weight:800;
  padding:8px 0; flex:1;
  background:#1a1a1a; color:#888; border:1.5px solid #333;
  -webkit-tap-highlight-color:transparent;
  transition: all .15s;
  min-width:0;
}
.tab.active { color:#fff; border-color:currentColor; }
.tab:active { transform:scale(.93); }

.live-badge {
  display:flex; align-items:center; gap:4px; flex-shrink:0;
  font-size:11px; font-weight:800; letter-spacing:1px; color:#00e676;
}
.live-badge.behind { color:#444; }
.live-dot { width:9px; height:9px; border-radius:50%; background:#00e676; animation:blink 1.4s ease-in-out infinite; }
.live-badge.behind .live-dot { background:#444; animation:none; }
@keyframes blink { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.3;transform:scale(1.4);} }

/* ── PROGRESS ── */
.progress-strip {
  flex-shrink:0;
  padding:9px 14px 11px;
  border-bottom:2px solid #222;
}
.dvr-label { font-size:12px; font-weight:700; color:#00e676; text-align:center; margin-bottom:7px; }
.dvr-label.waiting { color:#555; }
.prog-labels { display:flex; justify-content:space-between; font-size:14px; font-weight:700; color:#fff; margin-bottom:5px; }
.prog-track { width:100%; height:8px; background:#2a2a2a; border-radius:4px; cursor:pointer; }
.prog-fill { height:100%; border-radius:4px; transition:width .5s linear; width:100%; }

/* ── BUTTONS ── */
.main {
  flex:1; min-height:0;
  display:flex; flex-direction:row;
  padding:10px; gap:10px;
}
.col     { flex:1; display:flex; flex-direction:column; gap:10px; }
.col-mid { flex:0 0 32%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; }

.btn {
  flex:1; border:none; cursor:pointer;
  border-radius:16px; font-family:inherit; font-weight:800;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:6px; min-height:0; width:100%;
  -webkit-tap-highlight-color:transparent;
  user-select:none; touch-action:manipulation;
  transition:transform .1s, filter .1s;
}
.btn:active { transform:scale(.90); filter:brightness(1.4); }
.btn-back { background:#1e0306; color:#ff8fa0; border:2px solid #5a1018; }
.btn-fwd  { background:#060e25; color:#8fc0ff; border:2px solid #142050; }
.btn .ico { font-size:clamp(22px,6vw,34px); line-height:1; }
.btn .lbl { font-size:clamp(14px,4vw,20px); }

.btn-play {
  border:none; cursor:pointer; border-radius:50%;
  color:#fff; display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
  user-select:none; touch-action:manipulation;
  transition:transform .1s, filter .1s;
}
.btn-play:active { transform:scale(.88); filter:brightness(1.2); }

.btn-live {
  display:none; border:none; cursor:pointer;
  border-radius:14px; background:#00e676; color:#000;
  font-family:inherit; font-size:clamp(15px,4.2vw,20px); font-weight:900;
  width:100%; padding:13px 0;
  align-items:center; justify-content:center;
  flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
  transition:transform .1s;
}
.btn-live:active { transform:scale(.92); }

/* ── BOTTOM ── */
.bottom {
  flex-shrink:0; border-top:2px solid #222;
  padding:9px 14px 11px;
}
.vol-row { display:flex; align-items:center; gap:12px; margin-bottom:5px; }
.vol-ico { font-size:20px; color:#555; }
input[type=range] { flex:1; accent-color:#fff; cursor:pointer; }
.status { font-size:13px; color:#777; text-align:center; min-height:18px; font-weight:600; }
.status.err { color:#ff6b6b; }

audio { display:none; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <!-- Logo (changes per station) -->
  <div class="logo-box" id="logoBox">
    <div class="logo-dot" id="logoDot"></div>
    <div class="logo-text" id="logoText">1LIVE</div>
    <div class="version" id="versionBadge">v10</div>
  </div>

  <!-- Station tabs -->
  <div class="station-tabs">
    <button class="tab active" data-station="1live">1LIVE</button>
    <button class="tab" data-station="diggi">DIGGI</button>
    <button class="tab" data-station="wdr2">WDR 2</button>
  </div>

  <div class="live-badge" id="liveBadge">
    <div class="live-dot"></div>LIVE
  </div>
</div>

<!-- PROGRESS -->
<div class="progress-strip">
  <div class="dvr-label waiting" id="dvrLabel">Verbinde…</div>
  <div class="prog-labels">
    <span id="lblBehind"></span>
    <span id="lblClock">– LIVE –</span>
  </div>
  <div class="prog-track" id="progTrack">
    <div class="prog-fill" id="progFill"></div>
  </div>
</div>

<!-- BUTTONS -->
<div class="main">
  <div class="col">
    <button class="btn btn-back" data-sec="-3600"><span class="ico">⏮</span><span class="lbl">− 1 Std</span></button>
    <button class="btn btn-back" data-sec="-1800"><span class="ico">⏮</span><span class="lbl">− 30 Min</span></button>
    <button class="btn btn-back" data-sec="-60"><span class="ico">⏮</span><span class="lbl">− 1 Min</span></button>
    <button class="btn btn-back" data-sec="-10"><span class="ico">⏮</span><span class="lbl">− 10 Sek</span></button>
  </div>

  <div class="col-mid" id="colMid">
    <button class="btn-play" id="btnPlay">▶</button>
    <button class="btn-live" id="btnLive">● LIVE</button>
  </div>

  <div class="col">
    <button class="btn btn-fwd" data-sec="3600"><span class="ico">⏭</span><span class="lbl">+ 1 Std</span></button>
    <button class="btn btn-fwd" data-sec="1800"><span class="ico">⏭</span><span class="lbl">+ 30 Min</span></button>
    <button class="btn btn-fwd" data-sec="60"><span class="ico">⏭</span><span class="lbl">+ 1 Min</span></button>
    <button class="btn btn-fwd" data-sec="90"><span class="ico">⏭</span><span class="lbl">+ 90 Sek</span></button>
  </div>
</div>

<!-- BOTTOM -->
<div class="bottom">
  <div class="vol-row">
    <span class="vol-ico">🔈</span>
    <input type="range" id="volSlider" min="0" max="1" step="0.02" value="0.8">
    <span class="vol-ico">🔊</span>
  </div>
  <div class="status" id="statusMsg">Sender wählen und ▶ tippen</div>
</div>

<audio id="audio"></audio>

<script>
// ═══════════ STATIONS ═══════════
const STATIONS = {
  '1live': {
    label:   '1LIVE',
    color:   '#e8001c',
    hls:     'https://wdrhf.akamaized.net/hls/live/2027955/1live/master.m3u8',
    mp3:     'https://wdr-1live-live.icecastssl.wdr.de/wdr/1live/live/mp3/128/stream.mp3',
  },
  'diggi': {
    label:   'DIGGI',
    color:   '#9b30f5',
    hls:     'https://wdrhf.akamaized.net/hls/live/2027958/1livediggi/master.m3u8',
    mp3:     'https://wdr-1livediggi-live.icecastssl.wdr.de/wdr/1livediggi/live/mp3/128/stream.mp3',
  },
  'wdr2': {
    label:   'WDR 2',
    color:   '#0077cc',
    hls:     'https://wdrhf.akamaized.net/hls/live/2027972/wdr2suedwestfalen/master.m3u8',
    mp3:     'https://wdr-wdr2-suedwestfalen.icecastssl.wdr.de/wdr/wdr2/suedwestfalen/mp3/128/stream.mp3',
  },
};

// ═══════════ DOM ═══════════
const audio      = document.getElementById('audio');
const btnPlay    = document.getElementById('btnPlay');
const btnLive    = document.getElementById('btnLive');
const volSlider  = document.getElementById('volSlider');
const statusMsg  = document.getElementById('statusMsg');
const liveBadge  = document.getElementById('liveBadge');
const dvrLabel   = document.getElementById('dvrLabel');
const progFill   = document.getElementById('progFill');
const lblBehind  = document.getElementById('lblBehind');
const lblClock   = document.getElementById('lblClock');
const progTrack  = document.getElementById('progTrack');
const logoBox    = document.getElementById('logoBox');
const logoDot    = document.getElementById('logoDot');
const logoText   = document.getElementById('logoText');

// ═══════════ STATE ═══════════
let hls=null, isPlaying=false, dvrAvailable=false, usingFallback=false;
let currentStation = '1live';
let anchorCT=null, anchorWall=null;

// ═══════════ HELPERS ═══════════
function pad2(n){ return String(n).padStart(2,'0'); }
function fmtClock(d){ return `${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`; }
function fmtBehind(s){
  s=Math.round(s);
  if(s>=3600){ return `−${Math.floor(s/3600)}h ${pad2(Math.floor((s%3600)/60))}m hinter live`; }
  if(s>=60)  { return `−${Math.floor(s/60)}m ${pad2(s%60)}s hinter live`; }
  return `−${s}s hinter live`;
}
function fmtDelta(s){
  s=Math.abs(Math.round(s));
  if(s>=3600) return `${Math.floor(s/3600)}h ${pad2(Math.floor((s%3600)/60))}m`;
  if(s>=60)   return `${Math.floor(s/60)}m ${pad2(s%60)}s`;
  return `${s}s`;
}

// ═══════════ STATION UI ═══════════
function applyStationTheme(key){
  const st = STATIONS[key];
  logoBox.style.background = st.color;
  logoText.textContent = st.label;
  progFill.style.background = st.color;
  btnPlay.style.background = st.color;
  btnPlay.style.boxShadow = `0 0 32px ${st.color}55`;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.station === key);
    t.style.color = t.dataset.station === key ? st.color : '';
    t.style.borderColor = t.dataset.station === key ? st.color : '';
  });
}

// ═══════════ CLOCK ANCHOR ═══════════
function getLiveEdge(){
  if(audio.seekable && audio.seekable.length>0)
    return audio.seekable.end(audio.seekable.length-1);
  const d=audio.duration;
  return (!isNaN(d)&&d!==Infinity&&d>0) ? d : null;
}
function setAnchor(){
  const e=getLiveEdge(); if(!e) return;
  anchorCT=e; anchorWall=Date.now();
}
function getStreamTime(){
  if(!dvrAvailable||anchorCT===null) return new Date();
  return new Date(anchorWall+(audio.currentTime-anchorCT)*1000);
}

// ═══════════ PROGRESS UI ═══════════
function updateUI(){
  const streamT  = getStreamTime();
  const behindSec = Math.max(0,(Date.now()-streamT.getTime())/1000);
  lblClock.textContent = dvrAvailable&&anchorCT!==null ? fmtClock(streamT) : '– LIVE –';
  if(dvrAvailable && behindSec>3){
    const pct = Math.max(0,Math.min(100,(1-behindSec/(125*60))*100));
    progFill.style.width = pct+'%';
    lblBehind.textContent = fmtBehind(behindSec);
    btnLive.style.display='flex';
    liveBadge.classList.add('behind');
  } else {
    progFill.style.width='100%';
    lblBehind.textContent='';
    btnLive.style.display='none';
    liveBadge.classList.remove('behind');
  }
}

// ═══════════ SEEK ═══════════
function seek(delta){
  if(!dvrAvailable){ statusMsg.textContent='Kein DVR-Puffer.'; return; }
  const e=getLiveEdge();
  if(!e){ statusMsg.textContent=delta>0?'An Live-Kante.':'Warte nach Start.'; return; }
  audio.currentTime=Math.max(0,Math.min(e,audio.currentTime+delta));
  statusMsg.textContent=delta<0?`− ${fmtDelta(delta)} zurück`:`+ ${fmtDelta(delta)} vor`;
}
document.querySelectorAll('[data-sec]').forEach(b=>
  b.addEventListener('click',()=>seek(+b.dataset.sec))
);

// Progress bar click
progTrack.addEventListener('click', e=>{
  if(!dvrAvailable||anchorCT===null) return;
  const eg=getLiveEdge(); if(!eg) return;
  const r=progTrack.getBoundingClientRect();
  const pct=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
  audio.currentTime=Math.max(0,Math.min(eg,eg-(1-pct)*125*60));
});

// ═══════════ PLAY BUTTON SIZING ═══════════
function sizePlay(){
  const mid=document.getElementById('colMid');
  const live=document.getElementById('btnLive');
  const play=document.getElementById('btnPlay');
  const lh=live.offsetHeight||0, gap=lh>0?10:0;
  const size=Math.min(mid.clientHeight-lh-gap, mid.clientWidth, 200);
  play.style.width=size+'px'; play.style.height=size+'px';
  play.style.fontSize=Math.round(size*.4)+'px';
}
window.addEventListener('resize', sizePlay);
requestAnimationFrame(()=>requestAnimationFrame(sizePlay));

// ═══════════ CONTROLS ═══════════
btnPlay.addEventListener('click',()=>{
  if(!audio.src&&!hls) loadStation(currentStation);
  if(isPlaying) audio.pause();
  else audio.play().catch(()=>{ statusMsg.textContent='Nochmal tippen ▶'; });
});
btnLive.addEventListener('click',()=>{
  if(!dvrAvailable) return;
  const e=getLiveEdge(); if(e) audio.currentTime=e-1;
  setAnchor();
  statusMsg.textContent='Zurück zur Live-Kante.';
});
volSlider.addEventListener('input',()=>{ audio.volume=+volSlider.value; });
audio.volume=0.8;

// ═══════════ STATION SWITCHING ═══════════
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    const key=tab.dataset.station;
    if(key===currentStation && (audio.src||hls)){
      // same station — just toggle play
      if(isPlaying) audio.pause(); else audio.play();
      return;
    }
    loadStation(key);
  });
});

function loadStation(key){
  // Tear down existing stream
  if(hls){ hls.destroy(); hls=null; }
  audio.pause();
  audio.src='';
  isPlaying=false; dvrAvailable=false; usingFallback=false;
  anchorCT=null; anchorWall=null;
  btnPlay.textContent='▶';
  progFill.style.width='100%';
  lblBehind.textContent=''; lblClock.textContent='– LIVE –';
  btnLive.style.display='none';
  liveBadge.classList.remove('behind');
  dvrLabel.textContent='Verbinde…'; dvrLabel.className='dvr-label waiting';

  currentStation=key;
  applyStationTheme(key);
  statusMsg.textContent=`Lade ${STATIONS[key].label}…`;
  initHLS(key);
}

// ═══════════ HLS INIT ═══════════
function setSeekEnabled(on){
  document.querySelectorAll('[data-sec]').forEach(b=>{
    b.disabled=!on; b.style.opacity=on?'1':'0.3';
  });
}

function initHLS(key){
  const st=STATIONS[key];
  if(typeof Hls!=='undefined'&&Hls.isSupported()){
    hls=new Hls({enableWorker:true,lowLatencyMode:false,
      backBufferLength:90,maxBufferLength:60,maxMaxBufferLength:7200});
    hls.loadSource(st.hls);
    hls.attachMedia(audio);
    hls.on(Hls.Events.MANIFEST_PARSED,()=>{
      statusMsg.textContent=`${st.label} bereit — tippe ▶`;
      setSeekEnabled(true);
    });
    hls.on(Hls.Events.LEVEL_LOADED,(_,d)=>{
      if(d.details&&d.details.totalduration>10){
        dvrAvailable=d.details.totalduration>30;
        if(dvrAvailable){
          dvrLabel.textContent=`DVR aktiv — bis zu ${Math.round(d.details.totalduration/60)} Min zurück`;
          dvrLabel.className='dvr-label';
        } else {
          dvrLabel.textContent='Kein DVR-Puffer'; dvrLabel.className='dvr-label waiting';
        }
      }
    });
    hls.on(Hls.Events.ERROR,(_,d)=>{
      if(d.fatal){ statusMsg.textContent='HLS-Fehler → MP3…'; hls.destroy(); hls=null; initMP3(key); }
    });
  } else if(audio.canPlayType('application/vnd.apple.mpegurl')){
    audio.src=st.hls;
    statusMsg.textContent=`${st.label} (Safari) — tippe ▶`;
    audio.addEventListener('durationchange',()=>{
      const d=audio.duration;
      if(d&&d!==Infinity){
        dvrAvailable=d>30;
        if(dvrAvailable){ dvrLabel.textContent=`DVR — bis zu ${Math.round(d/60)} Min`; dvrLabel.className='dvr-label'; }
      }
    },{once:true});
  } else { initMP3(key); }
}

function initMP3(key){
  usingFallback=true; dvrAvailable=false;
  audio.src=STATIONS[key].mp3;
  dvrLabel.textContent='MP3 — kein Vor-/Zurückspulen'; dvrLabel.className='dvr-label waiting';
  statusMsg.textContent=`Tippe ▶ (MP3, kein Timeshift)`;
  setSeekEnabled(false);
}

// ═══════════ AUDIO EVENTS ═══════════
audio.addEventListener('playing',()=>{
  isPlaying=true; btnPlay.textContent='⏸';
  statusMsg.textContent=usingFallback?`Spielt (MP3).`:`Spielt.`;
  if(dvrAvailable&&anchorCT===null){ setAnchor(); }
  sizePlay();
});
audio.addEventListener('pause', ()=>{ isPlaying=false; btnPlay.textContent='▶'; });
audio.addEventListener('waiting',()=>{ statusMsg.textContent='Puffert…'; });
audio.addEventListener('error', ()=>{ statusMsg.textContent='Fehler. Neu laden.'; statusMsg.className='status err'; });
audio.addEventListener('timeupdate', updateUI);
setInterval(updateUI, 1000);

// ═══════════ INIT ═══════════
applyStationTheme('1live');
loadStation('1live');
</script>
</body>
</html>
