<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Podcasts – Neueste Folgen</title>
<style>
  :root {
    --bg: #101214;
    --bg-elevated: #1a1d21;
    --border: #2a2e33;
    --text: #e8e6e1;
    --text-dim: #8b9096;
    --accent: #ff7a45;
    --accent-dim: #7a3d24;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  header {
    padding: 28px 20px 16px;
    max-width: 900px;
    margin: 0 auto;
  }

  header h1 {
    font-size: 22px;
    font-weight: 600;
    margin: 0 0 4px;
    letter-spacing: -0.02em;
  }

  header p {
    color: var(--text-dim);
    font-size: 13px;
    margin: 0;
  }

  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 20px 160px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
    margin-top: 16px;
  }

  .card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    cursor: pointer;
    display: flex;
    gap: 12px;
    align-items: center;
    transition: border-color 0.15s ease, transform 0.1s ease;
    text-align: left;
  }

  .card:hover {
    border-color: var(--accent-dim);
  }

  .card:active {
    transform: scale(0.98);
  }

  .card.active {
    border-color: var(--accent);
  }

  .card img {
    width: 56px;
    height: 56px;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--border);
  }

  .card-text {
    min-width: 0;
    flex: 1;
  }

  .card-podcast {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--accent);
    margin: 0 0 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-title {
    font-size: 14px;
    font-weight: 500;
    margin: 0 0 3px;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-date {
    font-size: 12px;
    color: var(--text-dim);
    margin: 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-listened {
    color: var(--accent);
    font-size: 12px;
  }

  .card.error {
    opacity: 0.5;
    cursor: default;
  }

  .card.error:hover { border-color: var(--border); }

  .card.loading .card-title { color: var(--text-dim); }

  /* Player */
  #player-bar {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--bg-elevated);
    border-top: 1px solid var(--border);
    padding: 12px 20px 16px;
    transform: translateY(100%);
    transition: transform 0.25s ease;
  }

  #player-bar.visible {
    transform: translateY(0);
  }

  .player-inner {
    max-width: 900px;
    margin: 0 auto;
  }

  .player-info {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .player-info img {
    width: 40px;
    height: 40px;
    border-radius: 6px;
    object-fit: cover;
    flex-shrink: 0;
  }

  .player-info-text {
    min-width: 0;
    flex: 1;
  }

  #player-podcast {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--accent);
    margin: 0;
  }

  #player-title {
    font-size: 13px;
    margin: 2px 0 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  audio {
    width: 100%;
    margin-bottom: 10px;
    height: 32px;
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .controls button {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }

  .controls button:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .controls button.play {
    background: var(--accent);
    color: #1a1108;
    border-color: var(--accent);
    font-weight: 600;
    min-width: 64px;
  }

  .status {
    color: var(--text-dim);
    font-size: 13px;
    padding: 20px 0;
  }
</style>
</head>
<body>

<main>
  <div class="grid" id="grid"></div>
</main>

<div id="player-bar">
  <div class="player-inner">
    <div class="player-info">
      <img id="player-img" src="" alt="">
      <div class="player-info-text">
        <p id="player-podcast"></p>
        <p id="player-title"></p>
      </div>
    </div>
    <audio id="audio" controls></audio>
    <div class="controls">
      <button id="back10">-10s</button>
      <button id="playpause" class="play">▶</button>
      <button id="fwd5">+5s</button>
      <button id="fwd30">+30s</button>
      <button id="fwd60">+60s</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   KONFIGURATION
   ============================================================ */

// URL des Apps Script Web-App-Deployments (Code.gs), das die Feeds
// als JSON liefert. Muss mit "/exec" enden.
const PROXY_URL = "https://script.google.com/macros/s/AKfycbyHk_vhnKMFkMp3M8KJiS2HDuOEVfysnmOJ6GBYZw2ovPQ-BXYZIXU06s9GbmowjdzX/exec";

// Liste der Podcasts. Einfach weitere Einträge {name, feed} hinzufügen.
const PODCASTS = [
  {
    name: "HeuteMorgen",
    feed: "https://www.srf.ch/feed/podcast/sd/179ababb-4b36-40b2-951d-92d5c207fe9f.xml"
  },
  {
    name: "Echo der Zeit",
    feed: "https://www.srf.ch/feed/podcast/sd/28549e81-c453-4671-92ad-cb28796d06a8.xml"
  },
  {
    name: "Handelsblatt Morning Briefing",
    feed: "https://handelsblatt-morningbriefing.podigee.io/feed/mp3"
  },
  {
    name: "Kalenderblatt",
    feed: "https://www.deutschlandfunk.de/dlf-kalenderblatt-100.xml"
  },
  {
    name: "WDR Kabarett",
    feed: "https://www1.wdr.de/mediathek/audio/wdr2/wdr2-kabarett/kabarett-podcast-100.podcast"
  },
  {
    name: "DLF Nachrichten (lang)",
    feed: "https://www.deutschlandfunk.de/nachrichten-108.xml",
    minDurationSeconds: 180 // nur Ausgaben ab 3 Min. - ggf. anpassen, siehe Hinweis im Chat
  },
  {
    name: "Das war der Tag",
    feed: "https://www.deutschlandfunk.de/das-war-der-tag-112.xml"
  },
  {
    name: "Kommentare und Themen der Woche",
    feed: "https://www.deutschlandfunk.de/kommentar-100.xml"
  }
];

/* ============================================================
   PERSISTENZ (localStorage)
   ============================================================ */

const STORAGE_KEY = 'podcastPlayerState_v2';

function loadAllState() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch (e) {
    return {};
  }
}

function saveAllState(state) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    console.error('localStorage-Fehler', e);
  }
}

function getPodcastState(allState, podcastName) {
  if (!allState[podcastName]) {
    allState[podcastName] = {
      lastSeenGuid: null,
      currentIndex: 0,
      progress: {},   // guid -> Sekunden
      listened: {}    // guid -> true
    };
  }
  return allState[podcastName];
}

/* ============================================================
   LOGIK
   ============================================================ */

const grid = document.getElementById('grid');
const audio = document.getElementById('audio');
const playerBar = document.getElementById('player-bar');
const playerImg = document.getElementById('player-img');
const playerPodcast = document.getElementById('player-podcast');
const playerTitle = document.getElementById('player-title');
const playPauseBtn = document.getElementById('playpause');

let activeCard = null;       // Karte, die zuletzt geklickt/fokussiert wurde
let activeEpisode = null;    // { podcastName, guid } der aktuell geladenen Episode
let saveProgressTimer = null;

const WEEKDAYS = ['So', 'Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa'];

function formatDateNoYear(pubDate) {
  if (!pubDate) return '';
  const d = new Date(pubDate);
  if (isNaN(d)) return pubDate;
  const wd = WEEKDAYS[d.getDay()];
  const day = String(d.getDate()).padStart(2, '0');
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const time = d.toLocaleTimeString('de-CH', { hour: '2-digit', minute: '2-digit' });
  return `${wd}, ${day}.${month}., ${time}`;
}

function createCard(podcast) {
  const card = document.createElement('div');
  card.className = 'card loading';
  card.innerHTML = `
    <img src="" alt="">
    <div class="card-text">
      <p class="card-podcast">${podcast.name}</p>
      <p class="card-title">Wird geladen …</p>
      <p class="card-date"></p>
    </div>
  `;
  grid.appendChild(card);
  return card;
}

async function loadPodcast(podcast, card) {
  try {
    const url = PROXY_URL + '?feed=' + encodeURIComponent(podcast.feed) +
      (podcast.minDurationSeconds ? '&minDuration=' + podcast.minDurationSeconds : '');
    const res = await fetch(url);
    const data = await res.json();

    if (data.error || !data.episodes || data.episodes.length === 0) {
      card.classList.remove('loading');
      card.classList.add('error');
      card.querySelector('.card-title').textContent = data.error || 'Kein Audio gefunden';
      return;
    }

    card.classList.remove('loading');
    card.dataset.podcastName = podcast.name;
    card.episodes = data.episodes; // neueste zuerst, Index 0 = neueste

    const allState = loadAllState();
    const pState = getPodcastState(allState, podcast.name);
    const newestGuid = data.episodes[0].guid;

    // Neue Episode seit letztem Besuch? -> immer die neueste zeigen
    if (pState.lastSeenGuid !== newestGuid) {
      pState.lastSeenGuid = newestGuid;
      pState.currentIndex = 0;
    }
    // Falls gespeicherter Index nicht mehr existiert (Feed kürzer geworden)
    if (pState.currentIndex >= data.episodes.length) {
      pState.currentIndex = 0;
    }
    saveAllState(allState);

    renderCard(card, podcast.name, pState.currentIndex);
    card.addEventListener('click', () => onCardClick(card));
  } catch (err) {
    card.classList.remove('loading');
    card.classList.add('error');
    card.querySelector('.card-title').textContent = 'Fehler beim Laden';
    console.error(podcast.name, err);
  }
}

function renderCard(card, podcastName, index) {
  const episode = card.episodes[index];
  const allState = loadAllState();
  const pState = getPodcastState(allState, podcastName);

  const img = card.querySelector('img');
  if (episode.imageUrl) img.src = episode.imageUrl;

  card.querySelector('.card-title').textContent = episode.title || '(ohne Titel)';

  const listened = !!pState.listened[episode.guid];
  const dateEl = card.querySelector('.card-date');
  dateEl.innerHTML = formatDateNoYear(episode.pubDate) +
    (listened ? ' <span class="card-listened">✓ gehört</span>' : '');
}

function onCardClick(card) {
  const podcastName = card.dataset.podcastName;
  const allState = loadAllState();
  const pState = getPodcastState(allState, podcastName);

  if (activeCard === card) {
    // Gleiche Karte nochmal geklickt -> eine Folge zurückblättern
    pState.currentIndex = Math.min(pState.currentIndex + 1, card.episodes.length - 1);
    saveAllState(allState);
  }
  // Andere/erste Karte -> aktuellen (ggf. gespeicherten) Index einfach abspielen

  renderCard(card, podcastName, pState.currentIndex);
  playEpisode(card, podcastName, pState.currentIndex);
  activeCard = card;
}

function playEpisode(card, podcastName, index) {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  card.classList.add('active');

  const episode = card.episodes[index];
  const allState = loadAllState();
  const pState = getPodcastState(allState, podcastName);

  playerImg.src = episode.imageUrl || '';
  playerPodcast.textContent = podcastName;
  playerTitle.textContent = (episode.title || '') + '  ·  ' + formatDateNoYear(episode.pubDate);

  audio.src = episode.audioUrl;
  activeEpisode = { podcastName, guid: episode.guid };

  const savedProgress = pState.progress[episode.guid];
  const resume = () => {
    if (savedProgress && savedProgress > 5 && (!audio.duration || savedProgress < audio.duration - 15)) {
      audio.currentTime = savedProgress;
    }
    audio.removeEventListener('loadedmetadata', resume);
  };
  audio.addEventListener('loadedmetadata', resume);

  audio.play();
  playerBar.classList.add('visible');
}

function persistProgress() {
  if (!activeEpisode || !audio.duration) return;
  const allState = loadAllState();
  const pState = getPodcastState(allState, activeEpisode.podcastName);
  pState.progress[activeEpisode.guid] = audio.currentTime;

  if (audio.currentTime / audio.duration > 0.95) {
    pState.listened[activeEpisode.guid] = true;
    if (activeCard) renderCard(activeCard, activeEpisode.podcastName, activeCard.episodes.findIndex(e => e.guid === activeEpisode.guid));
  }
  saveAllState(allState);
}

audio.addEventListener('timeupdate', () => {
  clearTimeout(saveProgressTimer);
  saveProgressTimer = setTimeout(persistProgress, 3000);
});
audio.addEventListener('pause', persistProgress);
audio.addEventListener('ended', () => {
  if (!activeEpisode) return;
  const allState = loadAllState();
  const pState = getPodcastState(allState, activeEpisode.podcastName);
  pState.listened[activeEpisode.guid] = true;
  saveAllState(allState);
  if (activeCard) renderCard(activeCard, activeEpisode.podcastName, activeCard.episodes.findIndex(e => e.guid === activeEpisode.guid));
});
window.addEventListener('beforeunload', persistProgress);

function skip(seconds) {
  if (!audio.src) return;
  audio.currentTime = Math.max(0, Math.min(audio.duration || Infinity, audio.currentTime + seconds));
}

document.getElementById('back10').addEventListener('click', () => skip(-10));
document.getElementById('fwd5').addEventListener('click', () => skip(5));
document.getElementById('fwd30').addEventListener('click', () => skip(30));
document.getElementById('fwd60').addEventListener('click', () => skip(60));

playPauseBtn.addEventListener('click', () => {
  if (audio.paused) audio.play(); else audio.pause();
});

audio.addEventListener('play', () => playPauseBtn.textContent = '❚❚');
audio.addEventListener('pause', () => playPauseBtn.textContent = '▶');

/* Init */
PODCASTS.forEach(podcast => {
  const card = createCard(podcast);
  loadPodcast(podcast, card);
});
</script>

</body>
</html>
