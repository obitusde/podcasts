<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Podcasts – Neueste Folgen</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#101214">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root {
    --bg: #101214;
    --bg-elevated: #1a1d21;
    --border: #2a2e33;
    --text: #e8e6e1;
    --text-dim: #8b9096;
    --accent: #ff7a45;
    --accent-dim: #7a3d24;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  header {
    padding: 28px 20px 16px;
    max-width: 900px;
    margin: 0 auto;
  }

  header h1 {
    font-size: 22px;
    font-weight: 600;
    margin: 0 0 4px;
    letter-spacing: -0.02em;
  }

  header p {
    color: var(--text-dim);
    font-size: 13px;
    margin: 0;
  }

  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 20px 100px; /* Fallback, wird per JS auf die echte Player-Höhe gesetzt */
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
    margin-top: 16px;
  }

  .card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    cursor: pointer;
    display: flex;
    gap: 12px;
    align-items: center;
    transition: border-color 0.15s ease, transform 0.1s ease;
    text-align: left;
  }

  .card:hover {
    border-color: var(--accent-dim);
  }

  .card:active {
    transform: scale(0.98);
  }

  .card.active {
    border-color: var(--accent);
  }

  .card img {
    width: 56px;
    height: 56px;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--border);
  }

  .card-text {
    min-width: 0;
    flex: 1;
  }

  .card-podcast {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--accent);
    margin: 0 0 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-title {
    font-size: 14px;
    font-weight: 500;
    margin: 0 0 3px;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-date {
    font-size: 12px;
    color: var(--text-dim);
    margin: 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-listened {
    color: var(--accent);
    font-size: 12px;
  }

  .card.error {
    opacity: 0.5;
    cursor: default;
  }

  .card.error:hover { border-color: var(--border); }

  .card.loading .card-title { color: var(--text-dim); }

  /* Player */
  #player-bar {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--bg-elevated);
    border-top: 1px solid var(--border);
    padding: 12px 20px 16px;
    transform: translateY(100%);
    transition: transform 0.25s ease;
  }

  #player-bar.visible {
    transform: translateY(0);
  }

  .player-inner {
    max-width: 900px;
    margin: 0 auto;
  }

  .player-info {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .player-info img {
    width: 40px;
    height: 40px;
    border-radius: 6px;
    object-fit: cover;
    flex-shrink: 0;
  }

  .player-info-text {
    min-width: 0;
    flex: 1;
  }

  #player-podcast {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--accent);
    margin: 0;
  }

  #player-title {
    font-size: 13px;
    margin: 2px 0 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  audio {
    width: 100%;
    margin-bottom: 12px;
    height: 54px;
  }

  .controls {
    display: flex;
    align-items: stretch;
    justify-content: center;
    gap: 8px;
    flex-wrap: nowrap;
  }

  .controls button {
    flex: 1 1 0;
    min-width: 0;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 16px 4px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }

  .controls button:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .controls button:active {
    background: var(--accent-dim);
  }

  .status {
    color: var(--text-dim);
    font-size: 13px;
    padding: 20px 0;
  }
</style>
</head>
<body>

<main>
  <div class="grid" id="grid"></div>
</main>

<div id="player-bar">
  <div class="player-inner">
    <div class="player-info">
      <img id="player-img" src="" alt="">
      <div class="player-info-text">
        <p id="player-podcast"></p>
        <p id="player-title"></p>
      </div>
    </div>
    <audio id="audio" controls></audio>
    <div class="controls">
      <button id="back10">-10s</button>
      <button id="back5">-5s</button>
      <button id="fwd5">+5s</button>
      <button id="fwd10">+10s</button>
      <button id="fwd30">+30s</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   KONFIGURATION
   ============================================================ */

// URL des Apps Script Web-App-Deployments (Code.gs), das die Feeds
// als JSON liefert. Muss mit "/exec" enden.
const PROXY_URL = "https://script.google.com/macros/s/AKfycbyHk_vhnKMFkMp3M8KJiS2HDuOEVfysnmOJ6GBYZw2ovPQ-BXYZIXU06s9GbmowjdzX/exec";

// Liste der Podcasts. Einfach weitere Einträge {name, feed} hinzufügen.
const PODCASTS = [
  {
    name: "HeuteMorgen",
    feed: "https://www.srf.ch/feed/podcast/sd/179ababb-4b36-40b2-951d-92d5c207fe9f.xml"
  },
  {
    name: "Echo der Zeit",
    feed: "https://www.srf.ch/feed/podcast/sd/28549e81-c453-4671-92ad-cb28796d06a8.xml"
  },
  {
    name: "Handelsblatt Morning Briefing",
    feed: "https://handelsblatt-morningbriefing.podigee.io/feed/mp3"
  },
  {
    name: "Kalenderblatt",
    feed: "https://www.deutschlandfunk.de/dlf-kalenderblatt-100.xml"
  },
  {
    name: "WDR Kabarett",
    feed: "https://www1.wdr.de/mediathek/audio/wdr2/wdr2-kabarett/kabarett-podcast-100.podcast"
  },
  {
    name: "DLF Nachrichten (lang)",
    feed: "https://www.deutschlandfunk.de/nachrichten-108.xml",
    minDurationSeconds: 420 // nur Ausgaben ab 7 Min. - Standardausgaben sind ~5 Min., lange sind 8-10 Min.
  },
  {
    name: "Das war der Tag",
    feed: "https://www.deutschlandfunk.de/das-war-der-tag-112.xml"
  },
  {
    name: "Kommentare und Themen der Woche",
    feed: "https://www.deutschlandfunk.de/kommentar-100.xml"
  }
];

/* ============================================================
   PERSISTENZ (localStorage)
   ============================================================ */

const STORAGE_KEY = 'podcastPlayerState_v2';

function loadAllState() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch (e) {
    return {};
  }
}

function saveAllState(state) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    console.error('localStorage-Fehler', e);
  }
}

function getPodcastState(allState, podcastName) {
  if (!allState[podcastName]) {
    allState[podcastName] = {
      lastSeenGuid: null,
      currentIndex: 0,
      progress: {},   // guid -> Sekunden
      listened: {}    // guid -> true
    };
  }
  return allState[podcastName];
}

/* ============================================================
   LOGIK
   ============================================================ */

const grid = document.getElementById('grid');
const mainEl = document.querySelector('main');
const audio = document.getElementById('audio');
const playerBar = document.getElementById('player-bar');
const playerImg = document.getElementById('player-img');
const playerPodcast = document.getElementById('player-podcast');
const playerTitle = document.getElementById('player-title');

let activeCard = null;       // Karte, die zuletzt geklickt/fokussiert wurde
let activeEpisode = null;    // { podcastName, guid } der aktuell geladenen Episode
let activeEpisodeEnded = false; // true, wenn die aktuelle Episode natürlich zu Ende gelaufen ist
let saveProgressTimer = null;

const WEEKDAYS = ['So', 'Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa'];

function formatDateNoYear(pubDate) {
  if (!pubDate) return '';
  const d = new Date(pubDate);
  if (isNaN(d)) return pubDate;
  const wd = WEEKDAYS[d.getDay()];
  const day = String(d.getDate()).padStart(2, '0');
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const time = d.toLocaleTimeString('de-CH', { hour: '2-digit', minute: '2-digit' });
  return `${wd}, ${day}.${month}., ${time}`;
}

function createCard(podcast) {
  const card = document.createElement('div');
  card.className = 'card loading';
  card.innerHTML = `
    <img src="" alt="">
    <div class="card-text">
      <p class="card-podcast">${podcast.name}</p>
      <p class="card-title">Wird geladen …</p>
      <p class="card-date"></p>
    </div>
  `;
  grid.appendChild(card);
  return card;
}

async function loadPodcast(podcast, card) {
  try {
    const url = PROXY_URL + '?feed=' + encodeURIComponent(podcast.feed) +
      (podcast.minDurationSeconds ? '&minDuration=' + podcast.minDurationSeconds : '');
    const res = await fetch(url);
    const data = await res.json();

    if (data.error || !data.episodes || data.episodes.length === 0) {
      card.classList.remove('loading');
      card.classList.add('error');
      card.querySelector('.card-title').textContent = data.error || 'Kein Audio gefunden';
      return;
    }

    card.classList.remove('loading');
    card.dataset.podcastName = podcast.name;
    card.episodes = data.episodes; // neueste zuerst, Index 0 = neueste

    const allState = loadAllState();
    const pState = getPodcastState(allState, podcast.name);
    const newestGuid = data.episodes[0].guid;

    // Neue Episode seit letztem Besuch? -> immer die neueste zeigen
    if (pState.lastSeenGuid !== newestGuid) {
      pState.lastSeenGuid = newestGuid;
      pState.currentIndex = 0;
    }
    // Falls gespeicherter Index nicht mehr existiert (Feed kürzer geworden)
    if (pState.currentIndex >= data.episodes.length) {
      pState.currentIndex = 0;
    }
    saveAllState(allState);

    renderCard(card, podcast.name, pState.currentIndex);
    card.addEventListener('click', () => onCardClick(card));
  } catch (err) {
    card.classList.remove('loading');
    card.classList.add('error');
    card.querySelector('.card-title').textContent = 'Fehler beim Laden';
    console.error(podcast.name, err);
  }
}

// Rendert eine Karte für einen bestimmten Episoden-Index.
// options.noOlder = true -> es gibt keine ältere Episode mehr als die
// gerade zu Ende gehörte; zeigt das statt eines Datums an.
function renderCard(card, podcastName, index, options) {
  options = options || {};
  const episode = card.episodes[index];
  const allState = loadAllState();
  const pState = getPodcastState(allState, podcastName);

  const img = card.querySelector('img');
  if (episode.imageUrl) img.src = episode.imageUrl;

  card.querySelector('.card-title').textContent = episode.title || '(ohne Titel)';

  const dateEl = card.querySelector('.card-date');
  if (options.noOlder) {
    dateEl.innerHTML = 'Keine ältere Folge geladen <span class="card-listened">✓ gehört</span>';
  } else {
    const listened = !!pState.listened[episode.guid];
    dateEl.innerHTML = formatDateNoYear(episode.pubDate) +
      (listened ? ' <span class="card-listened">✓ gehört</span>' : '');
  }
}

// Aktualisiert die Player-Leiste (Titel/Bild unten), OHNE etwas abzuspielen.
// Wird benutzt, wenn nach dem natürlichen Ende einer Folge schon die
// nächstältere angezeigt werden soll, bevor sie angeklickt wird.
function updatePlayerPreview(card, podcastName, index) {
  const episode = card.episodes[index];
  playerImg.src = episode.imageUrl || '';
  playerPodcast.textContent = podcastName;
  playerTitle.textContent = (episode.title || '') + '  ·  ' + formatDateNoYear(episode.pubDate);

  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: episode.title || podcastName,
      artist: podcastName,
      album: formatDateNoYear(episode.pubDate),
      artwork: episode.imageUrl ? [
        { src: episode.imageUrl, sizes: '512x512', type: 'image/jpeg' }
      ] : []
    });
  }
}

function onCardClick(card) {
  const podcastName = card.dataset.podcastName;
  const allState = loadAllState();
  const pState = getPodcastState(allState, podcastName);

  if (activeCard === card) {
    if (activeEpisodeEnded) {
      // Folge ist gerade zu Ende gelaufen und die Anzeige wurde bereits
      // auf die nächstältere Folge vorgerückt -> die jetzt einfach abspielen,
      // nicht nochmal weiterspringen.
    } else {
      // Card ist aktiv, aber Folge läuft noch/ist pausiert -> manuell
      // eine Folge weiter zurückblättern.
      pState.currentIndex = Math.min(pState.currentIndex + 1, card.episodes.length - 1);
      saveAllState(allState);
    }
  }
  // Andere/erste Karte -> aktuellen (ggf. gespeicherten) Index einfach abspielen

  renderCard(card, podcastName, pState.currentIndex);
  playEpisode(card, podcastName, pState.currentIndex);
  activeCard = card;
}

function playEpisode(card, podcastName, index) {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  card.classList.add('active');

  const episode = card.episodes[index];
  const allState = loadAllState();
  const pState = getPodcastState(allState, podcastName);

  playerImg.src = episode.imageUrl || '';
  playerPodcast.textContent = podcastName;
  playerTitle.textContent = (episode.title || '') + '  ·  ' + formatDateNoYear(episode.pubDate);

  audio.src = episode.audioUrl;
  activeEpisode = { podcastName, guid: episode.guid };
  activeEpisodeEnded = false;

  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: episode.title || podcastName,
      artist: podcastName,
      album: formatDateNoYear(episode.pubDate),
      artwork: episode.imageUrl ? [
        { src: episode.imageUrl, sizes: '512x512', type: 'image/jpeg' }
      ] : []
    });
  }

  const savedProgress = pState.progress[episode.guid];
  const resume = () => {
    if (savedProgress && savedProgress > 5 && (!audio.duration || savedProgress < audio.duration - 15)) {
      audio.currentTime = savedProgress;
    }
    audio.removeEventListener('loadedmetadata', resume);
  };
  audio.addEventListener('loadedmetadata', resume);

  audio.play();
  playerBar.classList.add('visible');
}

// Speichert nur die Wiedergabeposition (und markiert bei Bedarf als
// gehört). Rendert bewusst NICHTS - das übernimmt ausschliesslich der
// 'ended'-Handler, damit es nicht zu widersprüchlichen Neu-Renderings
// zwischen 'pause' (das vor 'ended' feuert) und 'ended' kommt.
function persistProgress() {
  if (!activeEpisode || !audio.duration) return;
  const allState = loadAllState();
  const pState = getPodcastState(allState, activeEpisode.podcastName);
  pState.progress[activeEpisode.guid] = audio.currentTime;

  if (audio.currentTime / audio.duration > 0.95) {
    pState.listened[activeEpisode.guid] = true;
  }
  saveAllState(allState);
}

audio.addEventListener('timeupdate', () => {
  clearTimeout(saveProgressTimer);
  saveProgressTimer = setTimeout(persistProgress, 3000);
});
audio.addEventListener('pause', persistProgress);

audio.addEventListener('ended', () => {
  if (!activeEpisode || !activeCard) return;
  activeEpisodeEnded = true;

  const podcastName = activeEpisode.podcastName;
  const allState = loadAllState();
  const pState = getPodcastState(allState, podcastName);
  pState.listened[activeEpisode.guid] = true;

  const finishedIndex = activeCard.episodes.findIndex(e => e.guid === activeEpisode.guid);
  const nextIndex = finishedIndex + 1; // eine Folge älter

  if (finishedIndex !== -1 && nextIndex < activeCard.episodes.length) {
    // Es gibt eine ältere Folge -> Anzeige darauf vorrücken (nur anzeigen,
    // nicht abspielen). Erst ein Klick auf die Karte spielt sie ab.
    pState.currentIndex = nextIndex;
    saveAllState(allState);
    renderCard(activeCard, podcastName, nextIndex);
    updatePlayerPreview(activeCard, podcastName, nextIndex);
  } else {
    // Keine ältere Folge mehr geladen -> das auf der Karte anzeigen,
    // bis neue Folgen nachkommen.
    if (finishedIndex !== -1) pState.currentIndex = finishedIndex;
    saveAllState(allState);
    renderCard(activeCard, podcastName, finishedIndex !== -1 ? finishedIndex : pState.currentIndex, { noOlder: true });
  }
});

window.addEventListener('beforeunload', persistProgress);

function skip(seconds) {
  if (!audio.src) return;
  audio.currentTime = Math.max(0, Math.min(audio.duration || Infinity, audio.currentTime + seconds));
}

document.getElementById('back10').addEventListener('click', () => skip(-10));
document.getElementById('back5').addEventListener('click', () => skip(-5));
document.getElementById('fwd5').addEventListener('click', () => skip(5));
document.getElementById('fwd10').addEventListener('click', () => skip(10));
document.getElementById('fwd30').addEventListener('click', () => skip(30));

/* ============================================================
   MEDIA SESSION - externe Buttons (Lockscreen, Kopfhörer, Auto)
   Play/Pause steuert die Wiedergabe, seekbackward/-forward sind
   fest auf -5s / +10s gelegt (wie gewünscht, unabhängig davon,
   was das Betriebssystem als Standardsprung vorschlägt).
   previoustrack/nexttrack springen zur älteren/neueren Folge.
   ============================================================ */

if ('mediaSession' in navigator) {
  navigator.mediaSession.setActionHandler('play', () => audio.play());
  navigator.mediaSession.setActionHandler('pause', () => audio.pause());
  navigator.mediaSession.setActionHandler('seekbackward', () => skip(-5));
  navigator.mediaSession.setActionHandler('seekforward', () => skip(10));

  navigator.mediaSession.setActionHandler('previoustrack', () => {
    if (!activeCard || !activeEpisode) return;
    const idx = activeCard.episodes.findIndex(e => e.guid === activeEpisode.guid);
    const olderIndex = idx + 1;
    if (idx === -1 || olderIndex >= activeCard.episodes.length) return;
    const podcastName = activeEpisode.podcastName;
    const allState = loadAllState();
    const pState = getPodcastState(allState, podcastName);
    pState.currentIndex = olderIndex;
    saveAllState(allState);
    renderCard(activeCard, podcastName, olderIndex);
    playEpisode(activeCard, podcastName, olderIndex);
  });

  navigator.mediaSession.setActionHandler('nexttrack', () => {
    if (!activeCard || !activeEpisode) return;
    const idx = activeCard.episodes.findIndex(e => e.guid === activeEpisode.guid);
    const newerIndex = idx - 1;
    if (idx === -1 || newerIndex < 0) return;
    const podcastName = activeEpisode.podcastName;
    const allState = loadAllState();
    const pState = getPodcastState(allState, podcastName);
    pState.currentIndex = newerIndex;
    saveAllState(allState);
    renderCard(activeCard, podcastName, newerIndex);
    playEpisode(activeCard, podcastName, newerIndex);
  });
}

audio.addEventListener('play', () => {
  if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
});
audio.addEventListener('pause', () => {
  if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
});

/* ============================================================
   WAKE LOCK - Bildschirm soll nicht einschlafen, solange die
   Seite sichtbar/aktiv ist (z.B. Handy im Autohalter).
   ============================================================ */

let wakeLock = null;

async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
  } catch (err) {
    console.error('Wake Lock nicht verfügbar:', err);
  }
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});
requestWakeLock();

/* ============================================================
   PLAYER-LEISTE: dynamisches Bottom-Padding
   Die Höhe der fixierten Player-Leiste kann je nach Gerät/Font-
   Skalierung variieren. Statt eines festen Paddings wird die
   tatsächliche Höhe laufend gemessen (ResizeObserver) und als
   Bottom-Padding auf <main> übertragen, damit die letzte Karte nie
   verdeckt wird.
   ============================================================ */

function syncMainPadding() {
  mainEl.style.paddingBottom = (playerBar.offsetHeight + 24) + 'px';
}

if ('ResizeObserver' in window) {
  new ResizeObserver(syncMainPadding).observe(playerBar);
} else {
  window.addEventListener('resize', syncMainPadding);
}
syncMainPadding();

/* ============================================================
   PWA: Service Worker registrieren (für "Zum Startbildschirm
   hinzufügen" unter Chrome/Android)
   ============================================================ */

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => {
      console.error('Service Worker Registrierung fehlgeschlagen:', err);
    });
  });
}

/* Init */
PODCASTS.forEach(podcast => {
  const card = createCard(podcast);
  loadPodcast(podcast, card);
});
</script>

</body>
</html>
